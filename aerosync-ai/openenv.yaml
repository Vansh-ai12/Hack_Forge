name: aerosync-ai
version: "1.0.0"
description: >
  AeroSync AI simulates a real-world warehouse-to-doorstep logistics pipeline.
  Robots pick items from warehouse shelves and transport them to dispatch zones.
  Drones collect from dispatch zones and fly to customer delivery points.
  Agents must coordinate under energy constraints and avoid collisions.

tags:
  - openenv
  - logistics
  - multi-agent
  - robotics
  - drones
  - battery-management

author: AeroSync AI Team
license: MIT

# ─── Task Registry ───────────────────────────────────────────────────────────
tasks:
  - name: easy
    description: "1 robot + 1 drone, 2 deliveries. Open 10x10 grid, no battery pressure."
    difficulty: 1
    agents:
      robots: 1
      drones: 1
    task_count: 2
    max_steps: 120
    expected_score_random: 0.10
    expected_score_baseline: 0.45

  - name: medium
    description: "3 robots + 2 drones, 6 deliveries. Battery management, dual dispatch zones, obstacles."
    difficulty: 2
    agents:
      robots: 3
      drones: 2
    task_count: 6
    max_steps: 250
    expected_score_random: 0.07
    expected_score_baseline: 0.32

  - name: hard
    description: "6 robots + 4 drones, 12 deliveries. Degraded batteries, congestion at 3 dispatch zones, mixed priorities."
    difficulty: 3
    agents:
      robots: 6
      drones: 4
    task_count: 12
    max_steps: 500
    expected_score_random: 0.05
    expected_score_baseline: 0.22

# ─── Observation Space ────────────────────────────────────────────────────────
observation_space:
  type: AeroSyncObservation
  fields:
    step:              "int — current step number"
    max_steps:         "int — episode horizon"
    agents:            "Dict[str, AgentState] — all agent positions, battery, cargo"
    tasks:             "Dict[str, TaskState]  — all task statuses and locations"
    dispatch_queue:    "List[str] — task IDs waiting at dispatch for drone pickup"
    charging_stations: "List[Position] — fixed charging pad locations"
    grid_width:        "int — grid X dimension"
    grid_height:       "int — grid Y dimension"
    reward:            "float — reward received this step"
    done:              "bool — episode terminated"
    metrics:           "Dict[str, float] — live KPIs"

# ─── Action Space ─────────────────────────────────────────────────────────────
action_space:
  type: AeroSyncAction
  fields:
    agent_id:    "str — which agent to command"
    action_type: "enum[move, pick, place, charge, wait, assign_task]"
    direction:   "optional enum[north, south, east, west, up, down] — for MOVE"
    task_id:     "optional str — for ASSIGN_TASK / PICK / PLACE"

# ─── Reward Function ──────────────────────────────────────────────────────────
reward:
  delivery_bonus:    +20.0
  dispatch_bonus:    +10.0
  pickup_bonus:       +5.0
  collision_penalty: -30.0
  battery_penalty:   -50.0
  delay_penalty:      -0.05  # per pending task per step
  idle_penalty:       -0.02  # per idle agent per step

# ─── Grading ─────────────────────────────────────────────────────────────────
grading:
  score_range: [0.0, 1.0]
  deterministic: true
  formula: >
    score = completion_weight * (delivered / total_tasks)
            + efficiency_weight * (1 - steps_used / max_steps * 0.5)
            + safety_weight * max(0, 1 - collisions*0.1 - battery_failures*0.15)
            + priority_weight * avg_priority_of_delivered_tasks

# ─── API Endpoints ────────────────────────────────────────────────────────────
api:
  reset:  "POST /reset   — body: {task_name: easy|medium|hard}"
  step:   "POST /step    — body: AeroSyncAction"
  state:  "GET  /state   — returns raw env state"
  grade:  "GET  /grade   — returns final score + breakdown"
  health: "GET  /health"
  tasks:  "GET  /tasks"

# ─── Runtime ─────────────────────────────────────────────────────────────────
runtime:
  framework: fastapi
  port: 7860
  docker: true
  huggingface_space: true
  python_version: "3.11"
